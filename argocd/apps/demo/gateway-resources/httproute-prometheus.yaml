apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: prometheus-system
spec:
  parentRefs:
  - name: envoy-gateway
    namespace: envoy-gateway-system
    sectionName: https-prometheus
  hostnames:
  - demo-prometheus.infra.opencost.io
  rules:
  - backendRefs:
    - name: prometheus-kube-prometheus-prometheus
      port: 9090
