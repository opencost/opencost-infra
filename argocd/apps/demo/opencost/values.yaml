opencost:
  # Schedule on the large pool; exporter + UI requests total ~75% of one np-demo-large node (6 OCPU, 96GiB)
  # nodeSelector:
  #   kubernetes.azure.com/agentpool: system
  metrics:
    kubeStateMetrics:
      emitNamespaceAnnotations: true
      emitPodAnnotations: true
  ui:
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway-system
          sectionName: https-opencost-ui
      hostnames:
        - demo.infra.opencost.io
    image:
      fullImageName: ghcr.io/opencost/opencost-ui:test-41370af
    resources:
      requests:
        cpu: 100m
        memory: 2Gi
      limits:
        memory: 2Gi
  mcp:
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway-system
          sectionName: https-opencost-mcp
      hostnames:
        - mcp-demo.infra.opencost.io
  prometheus:
    internal:
      serviceName: prometheus-kube-prometheus-prometheus
      port: 9090
  exporter:
    prometheusDataSource:
      queryResolutionSeconds: "60"
    image:
      fullImageName: ghcr.io/opencost/opencost:develop-44016ce
    adminToken:
      enabled: true
      existingSecret: "opencost-admin-token"
      secretKey: "admin-token"
    resources:
      requests:
        cpu: 4400m
        memory: 70Gi
      limits:
        memory: 70Gi
  cloudIntegrationSecret: "opencost-cloud-integration"
  cloudCost:
    enabled: false
  customPricing:
    enabled: true
    costModel:
      description: Modified pricing configuration.
      CPU: 1.25
      spotCPU: 0.006655
      RAM: 0.50
      spotRAM: 0.000892
      GPU: 0.95
      storage: 0.25
      zoneNetworkEgress: 0.01
      regionNetworkEgress: 0.01
      internetNetworkEgress: 0.12
