opencost:
  # Schedule on the large pool; exporter + UI requests total ~75% of one np-demo-large node (6 OCPU, 96GiB)
  nodeSelector:
    oke.oraclecloud.com/pool.name: np-demo-large
  metrics:
    kubeStateMetrics:
      emitNamespaceAnnotations: true
      emitPodAnnotations: true
  ui:
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway-system
          sectionName: https-opencost-ui
      hostnames:
        - demo.infra.opencost.io
    resources:
      requests:
        cpu: 100m
        memory: 2Gi
      limits:
        memory: 2Gi
    image:
      fullImageName: ghcr.io/opencost/opencost-ui:develop-32363fd
  mcp:
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway-system
          sectionName: https-opencost-mcp
      hostnames:
        - mcp-demo.infra.opencost.io
  prometheus:
    internal:
      serviceName: prometheus-kube-prometheus-prometheus
      port: 9090
  exporter:
    prometheusDataSource:
      queryResolutionSeconds: "60"
    adminToken:
      enabled: true
      existingSecret: "opencost-admin-token"
      secretKey: "admin-token"
    resources:
      requests:
        cpu: 4400m
        memory: 70Gi
      limits:
        memory: 70Gi
    image:
      fullImageName: ghcr.io/opencost/opencost:develop-86c754a
  cloudIntegrationSecret: "opencost-cloud-integration"
  cloudCost:
    enabled: true
