fullnameOverride: sealed-secrets

nodeSelector:
  kubernetes.azure.com/agentpool: system

tolerations:
  - key: "CriticalAddonsOnly"
    operator: "Exists"
  - key: "node.kubernetes.io/os"
    operator: "Equal"
    value: "linux"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi
