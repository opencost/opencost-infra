prometheusOperator:
  enabled: true

grafana:
  enabled: false

alertmanager:
  enabled: false

prometheus:
  ingress:
    enabled: false
  route:
    main:
      enabled: true
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      hostnames:
        - demo-prometheus.infra.opencost.io
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway-system
          sectionName: https-prometheus
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 360d
    # 75% of np-demo-large VM (6 OCPU, 96GiB allocatable)
    nodeSelector:
      oke.oraclecloud.com/pool.name: np-demo-large
    resources:
      requests:
        cpu: 4500m
        memory: 72Gi
      limits:
        memory: 72Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    additionalScrapeConfigs:
      - job_name: opencost
        honor_labels: true
        scrape_interval: 1m
        scrape_timeout: 10s
        metrics_path: /metrics
        scheme: http
        dns_sd_configs:
        - names:
          - opencost-demo.opencost
          type: 'A'
          port: 9003
      - job_name: opencost-dcgm-exporter
        honor_labels: true
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app, __meta_kubernetes_pod_label_app_kubernetes_io_component, __meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: (?i)(.*dcgm-exporter.*|.*dcgm-exporter.*|.*dcgm-exporter.*)
