apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prometheus
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      repoURL: https://github.com/trucpd/opencost-infra.git
      revision: main
      files:
      - path: "argocd/apps/*/prometheus/values.yaml"
  template:
    metadata:
      name: 'prometheus'
      labels:
        debug.argocd.argoproj.io/stage: '{{ index .path.segments 2 }}'
    spec:
      project: default
      sources:
        - repoURL: https://prometheus-community.github.io/helm-charts
          targetRevision: 70.3.0
          chart: kube-prometheus-stack
          helm:
            # networking.k8s.io/v1beta1 Ingress was removed in Kubernetes 1.22+. kube-prometheus-stack
            # picks Ingress apiVersion from Helm Capabilities; Argo must pass v1 + a recent kubeVersion
            # or template output can be v1beta1 and sync fails on modern clusters.
            kubeVersion: "1.31.1"
            apiVersions:
              - networking.k8s.io/v1
            valueFiles:
            - '$values/argocd/apps/{{ index .path.segments 2 }}/prometheus/values.yaml'
        - repoURL: https://github.com/trucpd/opencost-infra.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: prometheus-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true