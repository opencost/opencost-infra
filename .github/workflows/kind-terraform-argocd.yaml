name: KinD Terraform ArgoCD Sanity

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/kind-terraform-argocd.yaml"

permissions:
  contents: read

env:
  TF_WORKING_DIR: terraform

jobs:
  kind-terraform-argocd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: argocd-kind

      - name: Terraform init (local backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false -input=false -upgrade

      - name: Terraform apply Argo CD components to KinD
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -target=helm_release.argo_cd \
            -target=kubernetes_cluster_role_binding_v1.argocd_cluster_admin \
            -target=kubernetes_cluster_role_binding_v1.envoy_gateway_cluster_admin \
            -target=kubernetes_manifest.argocd_application
