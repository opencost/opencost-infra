name: DevSecOps CI for IaC

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write
  issues: write

jobs:
  terraform-fmt-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init (local backend)
        run: terraform init -backend=false -input=false -upgrade

      - name: Terraform validate
        run: terraform validate

  terraform-plan:
    needs: terraform-fmt-validate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: "true"
      ARM_USE_OIDC: "true"
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    permissions:
      contents: read
      id-token: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - id: tf-plan
        name: Terraform plan (local state)
        run: |
          terraform init -backend=false -input=false -upgrade
          set +e
          terraform plan -lock=false -input=false -refresh=false -out=tfplan -detailed-exitcode
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 2 ]; then
            exit "$exit_code"
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: terraform/tfplan
          if-no-files-found: error

      - name: Open reconciliation issue on drift
        if: ${{ steps.tf-plan.outputs.exit_code == '2' && github.event_name != 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Terraform drift detected in ${context.ref}`;
            const body = `
Detected Terraform changes during automated plan.

- Workflow: ${context.runId}
- Ref: ${context.ref}
- Plan artifact: terraform-plan-${context.runId}

Please reconcile IaC, apply changes with elevated access if required, and close this issue when resolved.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['terraform', 'drift', 'ops']
            });

  iac-security:
    runs-on: ubuntu-latest
    needs: terraform-fmt-validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tfsec (IaC security scan)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working-directory: terraform

  codeql:
    needs: terraform-fmt-validate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'terraform' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  kind-integration:
    needs: terraform-fmt-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: devsecops

      - name: Lint iperf3 chart
        run: helm lint argocd/charts/iperf3

      - name: Server-side dry-run install on kind
        run: |
          helm install iperf3 argocd/charts/iperf3 \
            --namespace devsecops \
            --create-namespace \
            --dry-run=server

      - name: Install Prometheus (required for OpenCost)
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm install prometheus prometheus-community/prometheus \
            --namespace prometheus-system \
            --create-namespace \
            --set prometheus-pushgateway.enabled=false \
            --set alertmanager.enabled=false \
            -f https://raw.githubusercontent.com/opencost/opencost/develop/kubernetes/prometheus/extraScrapeConfigs.yaml

      - name: Create OpenCost namespace
        run: kubectl create namespace opencost

      - name: Server-side dry-run OpenCost Helm install (on-prem custom pricing)
        run: |
          helm repo add opencost https://opencost.github.io/opencost-helm-chart
          helm repo update
          cat > /tmp/local-values.yaml <<'EOF'
opencost:
  customPricing:
    enabled: true
    costModel:
      description: "On-prem test pricing for CI dry-run"
      CPU: 1.25
      RAM: 0.50
      storage: 0.25
EOF
          helm install opencost opencost/opencost \
            --namespace opencost \
            -f /tmp/local-values.yaml \
            --dry-run=server
